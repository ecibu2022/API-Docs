<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCentre API Docs</title>
  
  <!-- Modern Typography (Roboto or Outfit) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Swagger UI default styles -->
  <link rel="stylesheet" href="dist/swagger-ui.css" />
  
  <style>
    :root {
      --primary: #007bff; /* Standard Blue */
      --bg: #ffffff;
      --sidebar-bg: #f8f9fa;
      --border: #dee2e6;
      --text: #212529;
      --text-muted: #6c757d;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Fixed Header */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 40px;
      border-bottom: 1px solid var(--border);
      background: white;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #000;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand span {
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    /* Auth Bar */
    .token-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 10px 40px;
      border-bottom: 1px solid var(--border);
    }

    .token-input {
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      width: 400px;
      outline: none;
    }

    .token-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,123,255,0.1);
    }

    .btn-apply {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
    }

    /* Main Layout */
    .main-layout {
      display: flex;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* Left Sidebar (Mimicking Table of Contents) */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .sidebar-section h4 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .sidebar-link {
      display: block;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 5px 0;
      transition: color 0.2s;
    }

    .sidebar-link:hover {
      color: var(--primary);
    }

    .sidebar-link.active {
      color: var(--primary);
      font-weight: 600;
    }

    /* Documentation Content */
    #swagger-ui {
      flex: 1;
      padding: 0 20px 100px;
    }

    /* Swagger UI Overrides for clean look */
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info { margin-top: 40px; }
    .swagger-ui .info .title { font-size: 2.2rem; font-weight: 700; color: #000; }
    .swagger-ui .info .description { font-size: 1.1rem; line-height: 1.6; color: #444; }
    .swagger-ui .scheme-container { background: transparent; box-shadow: none; padding: 20px 0; border-bottom: 1px solid var(--border); }
    .swagger-ui .opblock { border-radius: 8px; border: 1px solid var(--border); box-shadow: none; background: #fff; margin-bottom: 12px; }
    .swagger-ui .opblock-summary { border-bottom: none; }

    /* Mobile adjustments */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .token-input { width: 100%; }
      .token-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="nav-bar">
    <div class="brand">
      VetCentre Documentation <span>API</span>
    </div>
    <div style="font-size: 0.85rem; color: var(--text-muted);">v1.0.0</div>
  </nav>

  <!-- Persistent Token Bar -->
  <div class="token-bar">
    <span style="font-size: 0.9rem; font-weight: 600;">Token:</span>
    <input type="password" id="tokenInput" class="token-input" placeholder="Paste your Bearer Token here...">
    <button onclick="updateToken()" class="btn-apply">Save Token</button>
    <button onclick="clearToken()" style="background:none; border:none; color: var(--text-muted); cursor:pointer; font-size: 0.8rem;">Clear</button>
  </div>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h4>Getting Started</h4>
        <a href="#" class="sidebar-link active">Documentation Overview</a>
        <a href="#" class="sidebar-link">Authentication Guide</a>
      </div>
      <div class="sidebar-section">
        <h4>Core Resources</h4>
        <a href="#/Auth/post_ClientHandler_RequestJson" class="sidebar-link">Client Handler Endpoint</a>
        <a href="#" class="sidebar-link">Common Error Codes</a>
      </div>
      <div class="sidebar-section">
        <h4>Support</h4>
        <a href="mailto:support@vetcentre.com" class="sidebar-link">Contact Support</a>
      </div>
    </aside>

    <!-- UI Content -->
    <main id="swagger-ui"></main>
  </div>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    // Token Management
    window.BEARER_TOKEN = localStorage.getItem('bt_auth_token') || "";
    if (window.BEARER_TOKEN) {
      document.getElementById('tokenInput').value = window.BEARER_TOKEN;
    }

    function updateToken() {
      const val = document.getElementById('tokenInput').value.trim();
      window.BEARER_TOKEN = val;
      localStorage.setItem('bt_auth_token', val);
      alert('Token saved! All requests will now use this token.');
    }

    function clearToken() {
      window.BEARER_TOKEN = "";
      localStorage.removeItem('bt_auth_token');
      document.getElementById('tokenInput').value = "";
    }

    window.onload = function() {
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "BaseLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          if (window.BEARER_TOKEN) {
            const token = window.BEARER_TOKEN.replace(/^Bearer\s+/i, '');
            req.headers['Authorization'] = 'Bearer ' + token;
          }
          return req;
        }
      });
    };
  </script>
</body>
</html>
