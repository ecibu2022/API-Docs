<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCentre API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/swagger-ui.css" />
  
  <style>
    :root {
      --bg-main: #212121;
      --bg-side: #181818;
      --border: #333333;
      --text: #e6e6e6;
      --muted: #969696;
      --orange: #ff6c37;
      --blue: #097bed;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 260px;
      background: var(--bg-side);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      font-size: 13px;
    }

    .sidebar-lbl { padding: 16px 16px 8px; font-weight: 700; color: #777; font-size: 11px; text-transform: uppercase; }
    .item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; color: #bbb; }
    .item:hover { background: #262626; color: #fff; }
    .item.active { background: #262626; color: #fff; font-weight: 600; border-left: 2px solid var(--orange); }
    .method { color: #ffb400; font-weight: 800; font-size: 10px; width: 40px; }

    /* Workspace */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    .tab-hdr { height: 36px; background: var(--bg-side); display: flex; align-items: flex-end; padding: 0 8px; border-bottom: 1px solid var(--border); }
    .tab { height: 32px; background: #222; border: 1px solid var(--border); border-bottom: none; display: flex; align-items: center; gap: 8px; padding: 0 12px; font-size: 11px; color: #888; border-radius: 4px 4px 0 0; margin-right: 4px; }
    .tab.active { background: var(--bg-main); color: #fff; border-top: 2px solid var(--orange); }

    .action-sect { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .crumbs { font-size: 11px; color: #888; margin-bottom: 12px; }
    .crumbs b { color: #eee; font-weight: 600; }
    
    .url-input-grp { display: flex; gap: 8px; height: 32px; }
    .m-tag { color: #ffb400; font-weight: 800; background: rgba(255,180,0,0.1); padding: 0 12px; display: flex; align-items: center; border-radius: 4px; border: 1px solid rgba(255,180,0,0.2); font-size: 12px; }
    .url-box { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 0 12px; font-family: 'Fira Code', monospace; font-size: 13px; outline: none; }
    .btn-snd { background: var(--blue); color: white; border: none; padding: 0 20px; font-weight: 600; border-radius: 4px; cursor: pointer; }

    .sub-tabs { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    .st-list { display: flex; gap: 20px; }
    .st-item { font-size: 12px; color: #888; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
    .st-item.active { color: #eee; border-color: var(--orange); font-weight: 600; }
    
    .tk-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; }
    .tk-in { background: #262626; border: 1px solid #333; color: #eee; padding: 2px 8px; border-radius: 4px; outline: none; width: 140px; }

    .editor-wrap { flex: 1; overflow-y: auto; padding: 0 24px 100px; }

    /* Hiding the "Auth" tag header and top info for a cleaner Postman look */
    .swagger-ui .topbar, 
    .swagger-ui .info, 
    .swagger-ui .scheme-container, 
    .swagger-ui .opblock .opblock-summary,
    .swagger-ui .opblock-tag, /* Hide the "Auth" tag header */
    .swagger-ui .btn.execute { display: none !important; }

    .swagger-ui .opblock { border: none !important; box-shadow: none !important; background: transparent !important; margin: 0 !important; }
    .swagger-ui .opblock-body { padding: 0 !important; }
    .swagger-ui { background: transparent; }
    
    /* Syntax & Form colors for Dark Mode */
    .swagger-ui .parameter__name, 
    .swagger-ui table thead tr th, 
    .swagger-ui .response-col_description,
    .swagger-ui h4.opblock-title { color: #eee !important; font-size: 14px; }
    .swagger-ui .opblock-description-wrapper p { color: #999; }
    .swagger-ui .response-col_status { color: #49cc90; }
    .swagger-ui .btn.try-out__btn { display: none; } /* Hide Try it out as it's always on */
    .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5 { color: #eee; }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
  </style>
</head>
<body>

  <aside>
    <div class="sidebar-lbl">Collections</div>
    <div class="item">📂 VetCentre</div>
    <div class="item active" style="padding-left:32px;">
      <span class="method">POST</span> login
    </div>
    <div class="sidebar-lbl" style="margin-top:20px;">Environments</div>
    <div class="item">🌐 Business Central</div>
  </aside>

  <main>
    <header class="tab-hdr">
      <div class="tab active"><span style="color:#ffb400; font-weight:800; font-size:9px;">POST</span> login</div>
      <div class="tab">+</div>
    </header>

    <div class="action-sect">
      <div class="crumbs">VetCentre / auth / <b>login</b></div>
      <div class="url-input-grp">
        <div class="m-tag">POST</div>
        <input type="text" class="url-box" id="urlBox" value="{{URL}}/ClientHandler_RequestJson?company=VetCentre" />
        <button class="btn-snd" onclick="runReq()">Send</button>
      </div>
      <div class="sub-tabs">
        <div class="st-list">
          <div class="st-item">Params</div>
          <div class="st-item">Authorization</div>
          <div class="st-item active">Body <span style="background:var(--orange); width:5px; height:5px; border-radius:50%; display:inline-block; margin-bottom:2px;"></span></div>
          <div class="st-item">Headers</div>
        </div>
        <div class="tk-bar">
          Token: <input type="password" id="tkInput" class="tk-in" placeholder="..." onchange="setTk()">
        </div>
      </div>
    </div>

    <div class="editor-wrap">
      <div id="swagger-ui"></div>
    </div>
  </main>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    function setTk() {
      localStorage.setItem('bt_auth_token', document.getElementById('tkInput').value.trim());
      window.BEARER_TOKEN = localStorage.getItem('bt_auth_token');
    }

    function runReq() {
      const btn = document.querySelector('.btn.execute');
      if (btn) btn.click();
    }

    window.onload = function() {
      document.getElementById('tkInput').value = localStorage.getItem('bt_auth_token') || "";
      window.BEARER_TOKEN = document.getElementById('tkInput').value;

      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          if (window.BEARER_TOKEN) {
            req.headers['Authorization'] = 'Bearer ' + window.BEARER_TOKEN.replace(/^Bearer\s+/i, '');
          }
          return req;
        }
      });

      // Crucial: Auto-expand the Tag AND the Operation AND enable Try-it-out mode internal state
      const checkReady = setInterval(() => {
        const tag = document.querySelector('.opblock-tag');
        const op = document.querySelector('.opblock-post');
        
        if (tag && op) {
          // 1. Expand the tag if needed
          if (!tag.classList.contains('is-open')) tag.click();
          
          // 2. Expand the operation if needed
          if (!op.classList.contains('is-open')) {
            op.querySelector('.opblock-summary').click();
          }
          
          // 3. Clear interval once expanded
          if (op.classList.contains('is-open')) {
             console.log("UI Expanded successfully");
             clearInterval(checkReady);
          }
        }
      }, 100);
    };
  </script>
</body>
</html>
