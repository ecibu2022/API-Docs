<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCentre | Postman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/swagger-ui.css" />
  
  <style>
    :root {
      --bg-main: #ffffff;
      --bg-sidebar: #f2f2f2;
      --bg-tab: #f9f9f9;
      --bg-active-tab: #ffffff;
      --border: #e6e6e6;
      --text-main: #212121;
      --text-muted: #6b6b6b;
      --postman-orange: #ff6c37;
      --postman-blue: #097bed;
      --sidebar-width: 280px;
    }

    [data-theme='dark'] {
      --bg-main: #212121;
      --bg-sidebar: #1c1c1c;
      --bg-tab: #262626;
      --bg-active-tab: #212121;
      --border: #333333;
      --text-main: #e6e6e6;
      --text-muted: #969696;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
    }

    /* Top Utility Bar */
    .top-toolbar {
      height: 40px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; padding: 0 16px;
    }

    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 12px; }
    .logo-p { background: var(--postman-orange); color: white; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; }

    /* Main Container */
    .app-container { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; font-size: 12px; }
    .sidebar-header { padding: 12px 16px; font-weight: 700; color: var(--text-muted); font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .tree-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; color: var(--text-muted); }
    .tree-item.active { background: rgba(255,108,55,0.1); color: var(--postman-orange); font-weight: 600; }
    .tag-post { color: #ffb400; font-weight: 800; font-size: 9px; width: 35px; }

    /* Workspace Area */
    .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Tabs Bar */
    .tabs-bar { height: 36px; background: var(--bg-sidebar); display: flex; align-items: flex-end; padding: 0 8px; border-bottom: 1px solid var(--border); }
    .tab { height: 28px; padding: 0 12px; background: var(--bg-tab); border: 1px solid var(--border); border-bottom: none; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); border-radius: 4px 4px 0 0; margin-right: 4px; }
    .tab.active { background: var(--bg-active-tab); color: var(--text-main); border-top: 2px solid var(--postman-orange); }

    /* Request Editor Header (Action Section) */
    .request-action-bar {
      padding: 16px 24px;
      background: var(--bg-active-tab);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 12px;
    }

    .breadcrumbs { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .breadcrumbs-active { color: var(--text-main); font-weight: 600; }

    .url-bar-container { display: flex; gap: 8px; align-items: stretch; }
    .method-tag { background: rgba(255,180,0,0.1); color: #ffb400; font-weight: 700; padding: 0 12px; height: 32px; display: flex; align-items: center; border-radius: 4px; font-size: 12px; border: 1px solid rgba(255,180,0,0.2); }
    .url-input { flex: 1; border: 1px solid var(--border); background: var(--bg-sidebar); color: var(--text-main); padding: 0 12px; border-radius: 4px; font-size: 13px; font-family: 'Fira Code', monospace; outline: none; }
    .btn-send { background: var(--postman-blue); color: white; border: none; padding: 0 20px; font-weight: 600; border-radius: 4px; cursor: pointer; transition: filter 0.2s; }
    .btn-send:hover { filter: brightness(1.1); }

    /* Request Tabs (Body, Auth, etc.) */
    .request-tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); padding: 0 24px; }
    .request-tab { padding: 8px 0; font-size: 12px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
    .request-tab.active { border-bottom-color: var(--postman-orange); color: var(--text-main); font-weight: 600; }

    /* Main Area for Swagger UI content only */
    .editor-body { flex: 1; overflow-y: auto; padding: 0 24px 100px; }

    /* Hiding Redundant Swagger UI Elements */
    .swagger-ui .topbar, .swagger-ui .info, .swagger-ui .scheme-container { display: none !important; }
    .swagger-ui .opblock .opblock-summary { display: none !important; } /* Hide the summary bar as we have our own method/URL header */
    .swagger-ui .opblock { border: none !important; background: transparent !important; box-shadow: none !important; }
    .swagger-ui .opblock-section-header { display: none !important; }
    .swagger-ui .btn.execute { display: none !important; } /* Hide Execute as we use Send */
    .swagger-ui .opblock-body { padding: 0 !important; }
    .swagger-ui .tab { border: none !important; border-bottom: 2px solid transparent !important; color: var(--text-muted) !important; font-weight: 500 !important; }
    .swagger-ui .tab.active { border-bottom: 2px solid var(--postman-orange) !important; color: var(--text-main) !important; }
    .swagger-ui .response-col_status { color: #49cc90; font-weight: 700; }

    /* Dark Mode specific overrides for Swagger UI */
    [data-theme='dark'] .swagger-ui .opblock-description-wrapper p { color: #999; }
    [data-theme='dark'] .swagger-ui .parameter__name { color: #e6e6e6; }
    [data-theme='dark'] .swagger-ui h4.opblock-title { color: #ff6c37; }
    [data-theme='dark'] .swagger-ui table thead tr th { color: #999; }
    [data-theme='dark'] .swagger-ui .response-col_description { color: #e6e6e6; }
    [data-theme='dark'] .swagger-ui section.models { background: #1a1a1a; border-color: #333; }
    [data-theme='dark'] .swagger-ui .model-title { color: #ff6c37; }

    /* Auth persistence pill */
    .auth-badge { font-size: 10px; background: rgba(73,204,144,0.1); color: #49cc90; border: 1px solid rgba(73,204,144,0.2); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body data-theme="dark">

  <nav class="top-toolbar">
    <div class="toolbar-left">
      <div class="logo-p">P</div>
      <div style="font-weight: 600; font-size: 12px; color: var(--text-muted);">Home / <span style="color: var(--text-main);">VetCentre Workspace</span></div>
    </div>
    <div class="toolbar-right">
      <button style="background:none; border:none; color: var(--text-muted); cursor:pointer; font-size: 16px;" onclick="toggleTheme()">🌓</button>
      <div class="auth-badge">AUTHENTICATED</div>
    </div>
  </nav>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">Collections</div>
      <div class="tree-item">📂 <strong>VetCentre</strong></div>
      <div class="tree-item active" style="padding-left: 24px;">
        <span class="tag-post">POST</span>
        <span>login</span>
      </div>
      <div class="sidebar-header" style="margin-top: 20px;">Environments</div>
      <div class="tree-item">🌐 Production (Business Central)</div>
    </aside>

    <main class="workspace">
      <div class="tabs-bar">
        <div class="tab"><span>📁 Overview</span></div>
        <div class="tab active">
          <span style="color: #ffb400; font-weight: 800; font-size: 9px;">POST</span>
          <span>login</span>
          <span style="margin-left: 8px; opacity: 0.5;">×</span>
        </div>
        <div class="tab">+</div>
      </div>

      <!-- Action Bar echoing the screenshot -->
      <header class="request-action-bar">
        <div class="breadcrumbs">
          VetCentre / auth / <span class="breadcrumbs-active">login</span>
        </div>
        
        <div class="url-bar-container">
          <div class="method-tag">POST</div>
          <input type="text" class="url-input" id="urlInput" value="{{BC_API_URL}}/ClientHandler_RequestJson?company=VetCentre" />
          <button class="btn-send" onclick="triggerExecute()">Send</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div class="request-tabs">
            <div class="request-tab">Params</div>
            <div class="request-tab">Authorization</div>
            <div class="request-tab">Headers <span style="font-size: 10px; background: rgba(0,0,0,0.1); padding: 1px 4px; border-radius: 4px;">1</span></div>
            <div class="request-tab active">Body</div>
            <div class="request-tab">Settings</div>
          </div>
          <div style="font-size: 11px; color: var(--text-muted);">
            Token: <input type="password" id="tokenInput" style="border:none; background: var(--bg-sidebar); border-radius: 3px; padding: 2px 5px; width: 150px; font-size: 10px;" placeholder="Auth Token..." onchange="updateToken()" />
          </div>
        </div>
      </header>

      <section class="editor-body">
        <div id="swagger-ui"></div>
      </section>
    </main>
  </div>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    function triggerExecute() {
      // Find the Swagger UI execute button (hidden) and click it
      const btn = document.querySelector('.btn.execute');
      if (btn) btn.click();
      else alert('Please expand the request before sending.');
    }

    function toggleTheme() {
      const b = document.body;
      b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // Token management
    window.BEARER_TOKEN = localStorage.getItem('bt_auth_token') || "";
    if (window.BEARER_TOKEN) document.getElementById('tokenInput').value = window.BEARER_TOKEN;

    function updateToken() {
      window.BEARER_TOKEN = document.getElementById('tokenInput').value.trim();
      localStorage.setItem('bt_auth_token', window.BEARER_TOKEN);
    }

    window.onload = function() {
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          if (window.BEARER_TOKEN) {
            const token = window.BEARER_TOKEN.replace(/^Bearer\s+/i, '');
            req.headers['Authorization'] = 'Bearer ' + token;
          }
          return req;
        }
      });

      // Auto-expand the Auth section to make it feel like "opening a file" in Postman
      setTimeout(() => {
        const opblock = document.querySelector('.opblock-post');
        if (opblock && !opblock.classList.contains('is-open')) {
          opblock.querySelector('.opblock-summary').click();
        }
      }, 500);
    };
  </script>
</body>
</html>
