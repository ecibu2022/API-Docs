<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCentre API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/swagger-ui.css" />
  
  <style>
    :root {
      --bg-active-tab: #212121;
      --bg-sidebar: #181818;
      --border: #333333;
      --text-main: #e6e6e6;
      --text-muted: #969696;
      --postman-orange: #ff6c37;
      --postman-blue: #097bed;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-active-tab);
      color: var(--text-main);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* Sidebar (Simplified) */
    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      font-size: 12px;
    }

    .sidebar-title { padding: 16px; font-weight: 700; color: #999; font-size: 11px; text-transform: uppercase; }
    .tree-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; cursor: pointer; color: #ccc; }
    .tree-item.active { background: #262626; color: #fff; font-weight: 600; border-left: 2px solid var(--postman-orange); }
    .post-tag { color: #ffb400; font-weight: 800; font-size: 9px; width: 32px; }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Top Tabs */
    .tabs { height: 36px; background: var(--bg-sidebar); display: flex; gap: 2px; padding: 0 8px; border-bottom: 1px solid var(--border); }
    .tab { height: 35px; min-width: 120px; display: flex; align-items: center; gap: 8px; background: #222; padding: 0 12px; border-radius: 4px 4px 0 0; font-size: 11px; border: 1px solid var(--border); border-bottom: none; cursor: pointer; }
    .tab.active { background: var(--bg-active-tab); border-top: 2px solid var(--postman-orange); }

    /* Action Bar (Simplified) */
    .action-bar { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .path { font-size: 11px; color: #888; margin-bottom: 15px; }
    .path span { color: #eee; font-weight: 600; }
    
    .url-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .meth { color: #ffb400; font-weight: 800; padding: 0 12px; height: 32px; display: flex; align-items: center; background: rgba(255,180,0,0.1); border-radius: 4px; border: 1px solid rgba(255,180,0,0.2); font-size: 12px; }
    .url { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; padding: 0 12px; font-family: 'Fira Code', monospace; font-size: 13px; }
    .send { background: var(--postman-blue); color: white; border: none; padding: 0 24px; border-radius: 4px; font-weight: 600; cursor: pointer; }

    /* Controls Bar (Tabs + Env/Token) */
    .controls { display: flex; justify-content: space-between; align-items: center; }
    .req-tabs { display: flex; gap: 20px; font-size: 12px; }
    .req-tab { padding: 8px 0; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
    .req-tab.active { color: #eee; border-color: var(--postman-orange); font-weight: 600; }
    
    .token-box { display: flex; align-items: center; gap: 8px; font-size: 11px; background: #262626; padding: 4px 10px; border: 1px solid #333; border-radius: 4px; }
    .token-in { background: none; border: none; color: #eee; width: 150px; outline: none; }

    /* Content Area */
    .body-editor { flex: 1; overflow-y: auto; padding: 0 24px 100px; }

    /* Swagger Minimalist Theme */
    .swagger-ui .topbar, .swagger-ui .info, .swagger-ui .scheme-container, .swagger-ui .opblock-summary, .swagger-ui .btn.execute { display: none !important; }
    .swagger-ui .opblock { border: none !important; box-shadow: none !important; background: transparent !important; }
    .swagger-ui { background: var(--bg-active-tab); }
    .swagger-ui table thead tr th, .swagger-ui .parameter__name, .swagger-ui .response-col_description { color: #eee !important; }
    .swagger-ui .opblock-description-wrapper p { color: #999; }
    .swagger-ui .response-col_status { color: #49cc90; }
    
    /* Scrollbars (Postman style) */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Collections</div>
    <div class="tree-item">📂 VetCentre</div>
    <div class="tree-item active" style="padding-left:32px;">
      <span class="post-tag">POST</span> login
    </div>
    <div class="sidebar-title" style="margin-top:20px;">Environments</div>
    <div class="tree-item">🌐 Business Central</div>
  </aside>

  <!-- Main Area -->
  <main class="main">
    <header class="tabs">
      <div class="tab active"><span style="color:#ffb400; font-weight:900; font-size:9px;">POST</span> login</div>
      <div class="tab"><span>+</span></div>
    </header>

    <div class="action-bar">
      <div class="path">VetCentre / auth / <span>login</span></div>
      <div class="url-row">
        <div class="meth">POST</div>
        <input type="text" class="url" value="{{URL}}/ClientHandler_RequestJson?company=VetCentre" />
        <button class="send" onclick="document.querySelector('.btn.execute').click()">Send</button>
      </div>
      <div class="controls">
        <div class="req-tabs">
          <div class="req-tab">Params</div>
          <div class="req-tab">Authorization</div>
          <div class="req-tab active">Body <span style="background:#ff6c37; width:6px; height:6px; border-radius:50%; display:inline-block; margin-left:4px;"></span></div>
          <div class="req-tab">Headers</div>
          <div class="req-tab">Settings</div>
        </div>
        <div class="token-box">
          <span style="color:#888;">Token:</span>
          <input type="password" id="tokenIn" class="token-in" placeholder="..." onchange="saveTok()">
        </div>
      </div>
    </div>

    <section class="body-editor">
      <div id="swagger-ui"></div>
    </section>
  </main>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    function saveTok() {
      localStorage.setItem('bt_auth_token', document.getElementById('tokenIn').value.trim());
      window.BEARER_TOKEN = localStorage.getItem('bt_auth_token');
    }

    window.onload = function() {
      document.getElementById('tokenIn').value = localStorage.getItem('bt_auth_token') || "";
      window.BEARER_TOKEN = document.getElementById('tokenIn').value;
      
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          if (window.BEARER_TOKEN) {
            req.headers['Authorization'] = 'Bearer ' + window.BEARER_TOKEN.replace(/^Bearer\s+/i, '');
          }
          return req;
        }
      });
      setTimeout(() => { if (!document.querySelector('.is-open')) document.querySelector('.opblock-summary').click(); }, 300);
    };
  </script>
</body>
</html>
