<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetCentre | API Documentation</title>
  
  <!-- Postman Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  
  <!-- Swagger UI styles -->
  <link rel="stylesheet" href="dist/swagger-ui.css" />
  
  <style>
    :root {
      --postman-orange: #FF6C37;
      --postman-bg: #FFFFFF;
      --postman-sidebar: #F9F9F9;
      --postman-border: #EDEDED;
      --postman-text: #212121;
      --postman-muted: #6B6B6B;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--postman-bg);
      color: var(--postman-text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Nav */
    header {
      height: 50px;
      padding: 0 20px;
      border-bottom: 1px solid var(--postman-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      z-index: 100;
    }

    .nav-left { display: flex; align-items: center; gap: 15px; }
    .logo {
      background: var(--postman-orange);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
    }
    .brand-name { font-weight: 600; font-size: 0.9rem; }

    /* Token Bar */
    .token-bar {
      height: 40px;
      background: #fbfbfb;
      border-bottom: 1px solid var(--postman-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      font-size: 0.8rem;
    }

    .token-bar span { color: var(--postman-muted); font-weight: 500; }
    .token-input {
      border: 1px solid var(--postman-border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 3px;
      width: 300px;
      font-size: 0.8rem;
      outline: none;
    }
    .token-input:focus { border-color: var(--postman-orange); }
    .btn-save {
      background: var(--postman-orange);
      color: #fff;
      border: none;
      padding: 4px 12px;
      border-radius: 3px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.75rem;
    }

    /* Main Content Layout */
    .postman-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left Sidebar */
    .postman-sidebar {
      width: 260px;
      background: var(--postman-sidebar);
      border-right: 1px solid var(--postman-border);
      overflow-y: auto;
      padding: 20px 0;
    }

    .sidebar-section { padding: 0 20px 10px; font-size: 0.75rem; font-weight: 700; color: var(--postman-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      font-size: 0.85rem;
      color: var(--postman-text);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar-item:hover { background: #EBEBEB; }
    .sidebar-item.active { background: #EBEBEB; border-left: 3px solid var(--postman-orange); padding-left: 17px; }
    .sidebar-item .method { font-size: 0.65rem; font-weight: 800; width: 35px; }
    .sidebar-item .post { color: #FFB400; } /* Postman orange-yellow for POST */

    /* Content Area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }

    .postman-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px;
    }

    /* Swagger Overrides to look like Postman */
    .swagger-ui { font-family: 'Inter', sans-serif !important; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info .title { font-size: 2.2rem; font-weight: 700; color: #212121; }
    .swagger-ui .info .description { color: #555; }
    .swagger-ui .opblock { border-radius: 4px; border: 1px solid var(--postman-border); box-shadow: none; background: #fff; }
    .swagger-ui .opblock-summary { border-bottom: 1px solid var(--postman-border); }
    .swagger-ui .btn.authorize { color: var(--postman-orange); border-color: var(--postman-orange); }
    .swagger-ui .btn.authorize:hover { background: var(--postman-orange); color: #fff; }
    .swagger-ui .opblock.opblock-post { border-color: #FFB400; background: rgba(255,180,0,0.02); }
    .swagger-ui .model-box { border-radius: 4px; border: 1px solid var(--postman-border); }

    /* Mobile */
    @media (max-width: 768px) {
      .postman-sidebar { display: none; }
      .token-input { width: 150px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="nav-left">
      <div class="logo">P</div>
      <div class="brand-name">VetCentre HR Training API</div>
      <span style="font-size: 0.75rem; color: #999; margin-left: 10px;">Public Documentation</span>
    </div>
    <div style="font-size: 0.8rem; font-weight: 600; color: var(--postman-muted);">v1.0.0</div>
  </header>

  <!-- Persistent Token Access -->
  <div class="token-bar">
    <span>AUTH</span>
    <input type="password" id="tokenInput" class="token-input" placeholder="Enter Bearer Token...">
    <button onclick="updateToken()" class="btn-save">Set Token</button>
    <button onclick="clearToken()" style="background:none; border:none; color:#999; cursor:pointer; font-size: 0.75rem;">Clear</button>
  </div>

  <div class="postman-wrapper">
    <!-- Postman Sidebar -->
    <aside class="postman-sidebar">
      <div class="sidebar-section">Collections</div>
      <a href="#" class="sidebar-item active">
        <span style="font-size: 1rem;">📁</span>
        <span style="font-weight: 600;">OData Handlers</span>
      </a>
      <a href="#/Auth/post_ClientHandler_RequestJson" class="sidebar-item">
        <span class="method post">POST</span>
        <span>RequestJson</span>
      </a>
      
      <div class="sidebar-section" style="margin-top: 20px;">Environment</div>
      <div class="sidebar-item">
        <span style="font-size: 1rem;">🌐</span>
        <span>Production Environment</span>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="content-area">
      <div class="postman-container">
        <div id="swagger-ui"></div>
      </div>
    </main>
  </div>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    // Persistence Logic
    window.BEARER_TOKEN = localStorage.getItem('bt_auth_token') || "";
    if (window.BEARER_TOKEN) {
      document.getElementById('tokenInput').value = window.BEARER_TOKEN;
    }

    function updateToken() {
      const val = document.getElementById('tokenInput').value.trim();
      window.BEARER_TOKEN = val;
      localStorage.setItem('bt_auth_token', val);
      alert('Token set as active Authorization header.');
    }

    function clearToken() {
      window.BEARER_TOKEN = "";
      localStorage.removeItem('bt_auth_token');
      document.getElementById('tokenInput').value = "";
    }

    window.onload = function() {
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "BaseLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          if (window.BEARER_TOKEN) {
            const token = window.BEARER_TOKEN.replace(/^Bearer\s+/i, '');
            req.headers['Authorization'] = 'Bearer ' + token;
          }
          return req;
        }
      });
    };
  </script>
</body>
</html>
