<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VetCentre API | OpenAPI</title>
  <link rel="stylesheet" type="text/css" href="dist/swagger-ui.css" />
  <link rel="icon" type="image/png" href="dist/favicon-32x32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="dist/favicon-16x16.png" sizes="16x16" />
  <style>
    html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    
    /* Token Persistence bar - keeping functionally but making it look standard */
    .token-bar { background: #333; padding: 10px 40px; display: flex; align-items: center; justify-content: flex-end; gap: 10px; color: white; font-family: sans-serif; font-size: 13px; }
    .token-bar input { background: #444; border: 1px solid #555; color: #fff; padding: 4px 8px; border-radius: 4px; width: 300px; outline: none; }
    .token-bar button { background: #007bff; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="token-bar">
    <span>Bearer Token:</span>
    <input type="password" id="tkInput" placeholder="Session Persistence Token...">
    <button onclick="saveTk()">Save Token</button>
  </div>
  
  <div id="swagger-ui"></div>

  <script src="dist/swagger-ui-bundle.js"></script>
  <script src="dist/swagger-ui-standalone-preset.js"></script>
  <script>
    function saveTk() {
      localStorage.setItem('v_auth', document.getElementById('tkInput').value.trim());
      alert("Token saved. Swagger will now use this for all requests.");
    }

    window.onload = function() {
      document.getElementById('tkInput').value = localStorage.getItem('v_auth') || "";

      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          const stored = localStorage.getItem('v_auth');
          if (stored) {
            req.headers['Authorization'] = 'Bearer ' + stored.replace(/^Bearer\s+/i, '');
          }
          return req;
        }
      });
    };
  </script>
</body>
</html>
