name: Deploy API Docs to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust if the branch name is different
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install postman-to-openapi redoc-cli

      - name: Convert Postman to OpenAPI
        run: |
          node convert_postman_to_openapi.js

      - name: Build Redoc documentation
        run: |
          npx redoc-cli build ./openapi.yaml -o ./index.html --title "VetCentre API Documentation"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_files: index.html,openapi.yaml
